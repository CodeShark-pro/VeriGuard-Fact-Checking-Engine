<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 20px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #1e1e24;
      /* Sleek dark grey/blue background */
      color: #f5f5f5;
      margin: 0;
    }

    h3 {
      margin-top: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
      /* Perfectly spaces the icon, text, and dot */
    }

    /* Sizes your icon to match the text height perfectly */
    h3 img {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      /* Optional: smoothly rounds the icon corners slightly */
    }

    /* Moves the green dot to the RIGHT side of the text */
    h3::after {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: #4caf50;
      border-radius: 50%;
      box-shadow: 0 0 8px #4caf50;
      margin-left: 4px;
      /* Gives it just a little breathing room from the 'e' */
    }

    textarea {
      width: 100%;
      height: 85px;
      margin-bottom: 15px;
      resize: none;
      background-color: #2b2b36;
      color: #ffffff;
      border: 1px solid #3f3f4e;
      border-radius: 8px;
      /* Modern rounded corners */
      padding: 12px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea::placeholder {
      color: #888;
    }

    textarea:focus {
      border-color: #4caf50;
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background-color: #43a047;
    }

    button:active {
      transform: scale(0.98);
      /* Satisfying click effect */
    }

    #resultBox {
      margin-top: 20px;
      font-size: 14px;
      padding: 15px;
      border-radius: 8px;
      display: none;
      line-height: 1.4;
    }

    /* Dark mode optimized result colors */
    .entailment {
      background-color: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.4);
      color: #81c784;
    }

    .contradiction {
      background-color: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.4);
      color: #e57373;
    }

    .neutral {
      background-color: rgba(158, 158, 158, 0.1);
      border: 1px solid rgba(158, 158, 158, 0.4);
      color: #e0e0e0;
    }

    #sourceLink {
      display: inline-block;
      margin-top: 8px;
      color: #64b5f6;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    #sourceLink:hover {
      color: #90caf9;
      text-decoration: underline;
    }
    .dashboard {
    display: flex;
    justify-content: space-between;
    background-color: #2b2b36;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
    border: 1px solid #3f3f4e;
  }
  .stat-box {
    text-align: center;
    flex: 1;
  }
  .stat-box:not(:last-child) {
    border-right: 1px solid #3f3f4e;
  }
  .stat-value {
    font-size: 18px;
    font-weight: bold;
    color: #ffffff;
  }
  .stat-label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }
  </style>
</head>

<body>
  <h3><img src="icon.png" alt="logo"> VeriGuard Engine</h3>
  <div class="dashboard">
    <div class="stat-box">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Total Checks</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="stat-true" style="color: #81c784;">0</div>
      <div class="stat-label">Verified</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="stat-false" style="color: #e57373;">0</div>
      <div class="stat-label">Debunked</div>
    </div>
  </div>
  <textarea id="claimInput" placeholder="Paste a claim here..."></textarea>
  <button id="verifyBtn">Verify Claim</button>

  <div id="resultBox">
    <strong id="verdictText"></strong><br><br>
    <a id="sourceLink" href="#" target="_blank" style="font-size: 12px;">View Source Article</a>
  </div>

  <script src="popup.js"></script>
</body>

</html>
